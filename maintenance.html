<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Under Maintenance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0c10;
            color: #c5c6c7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .box {
            max-width: 500px;
        }
        h1 {
            color: #66fcf1;
            font-size: 2.5em;
        }
        p {
            font-size: 1.2em;
        }
        .spinner {
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid #45a29e;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🚧 Under Maintenance</h1>
        <div class="spinner"></div>
        <p>Jellyfin is currently undergoing maintenance.</p>
        <p>Please check back soon.</p>
    </div>
</body>
</html>
